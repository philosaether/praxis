{% for p in priorities %}
<div class="priority-row"
     hx-get="/priorities/{{ p.id }}"
     hx-target="#detail-pane"
     hx-swap="innerHTML">
    <div class="name">{{ p.name }}</div>
    <div class="meta">
        <span class="type-badge {{ p.priority_type.value }}">{{ p.priority_type.value[:3] }}</span>
        <span class="status-indicator {% if p.status.value == 'active' %}active{% endif %}">
            {{ p.status.value }}
        </span>
        <span>{{ p.id }}</span>
    </div>
</div>
{% else %}
<div class="empty-state">
    <h3>No priorities found</h3>
    <p>Try adjusting your filters</p>
</div>
{% endfor %}
