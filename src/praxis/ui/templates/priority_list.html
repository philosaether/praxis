{% extends "base.html" %}

{% block title %}Praxis{% endblock %}

{% block body %}
<div class="container">
    <!-- Left Pane -->
    <div class="left-pane">
        <div class="header">
            <h1>Praxis</h1>
        </div>

        <!-- Main Toggle: Tasks | Priorities -->
        <div class="filters">
            <div class="view-toggle">
                <button class="view-btn"
                        id="tasks-view-btn"
                        hx-get="/tasks/list"
                        hx-target="#item-list"
                        onclick="setMode('tasks')">
                    Tasks
                </button>
                <button class="view-btn active"
                        id="priorities-view-btn"
                        hx-get="/priorities/list"
                        hx-target="#item-list"
                        onclick="setMode('priorities')">
                    Priorities
                </button>
            </div>

            <!-- Priority filters (shown when priorities mode) -->
            <div id="priority-filters" class="filter-group">
                <select name="type"
                        hx-get="/priorities/list"
                        hx-target="#item-list"
                        hx-include="[name='active']">
                    <option value="">All Types</option>
                    {% for t in priority_types %}
                    <option value="{{ t.value }}">{{ t.value|title }}</option>
                    {% endfor %}
                </select>

                <label>
                    <input type="checkbox"
                           name="active"
                           value="true"
                           hx-get="/priorities/list"
                           hx-target="#item-list"
                           hx-include="[name='type']">
                    Active only
                </label>
            </div>

            <!-- Task filters (hidden by default) -->
            <div id="task-filters" class="filter-group" style="display: none;">
                <select name="priority"
                        hx-get="/tasks/list"
                        hx-target="#item-list">
                    <option value="">All Priorities</option>
                    {% for p in priorities %}
                    <option value="{{ p.id }}">{{ p.name }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>

        <!-- Item List -->
        <div class="priority-list" id="item-list" hx-trigger="refresh from:body" hx-get="/tasks/list">
            {% include "partials/priority_rows.html" %}
        </div>
    </div>

    <!-- Right Pane: Detail View -->
    <div class="right-pane" id="detail-pane">
        <div class="empty-state">
            <h3>Select an item</h3>
            <p>Click an item on the left to view details</p>
        </div>
    </div>
</div>

<script>
    function setMode(mode) {
        // Toggle button states
        document.getElementById('tasks-view-btn').classList.toggle('active', mode === 'tasks');
        document.getElementById('priorities-view-btn').classList.toggle('active', mode === 'priorities');

        // Toggle filter visibility
        document.getElementById('priority-filters').style.display = mode === 'priorities' ? 'flex' : 'none';
        document.getElementById('task-filters').style.display = mode === 'tasks' ? 'flex' : 'none';

        // Clear detail pane
        document.getElementById('detail-pane').innerHTML = '<div class="empty-state"><h3>Select an item</h3><p>Click an item on the left to view details</p></div>';
    }
</script>
{% endblock %}
