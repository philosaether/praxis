<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Praxis - {% block title %}Priorities{% endblock %}</title>

    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>

    <style>
        /* Reset & Base */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg-primary: #1a1a2e;
            --bg-secondary: #16213e;
            --bg-tertiary: #0f3460;
            --text-primary: #eee;
            --text-secondary: #aaa;
            --text-muted: #666;
            --accent: #e94560;
            --accent-dim: #c73e54;
            --border: #333;
            --success: #4caf50;
            --warning: #ff9800;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.5;
            height: 100vh;
            overflow: hidden;
        }

        /* Layout */
        .container {
            display: flex;
            height: 100vh;
        }

        .left-pane {
            width: 400px;
            min-width: 300px;
            max-width: 500px;
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            background: var(--bg-secondary);
        }

        .right-pane {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem;
            background: var(--bg-primary);
        }

        /* Header */
        .header {
            padding: 1rem;
            border-bottom: 1px solid var(--border);
            background: var(--bg-tertiary);
        }

        .header h1 {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--accent);
        }

        /* Filters */
        .filters {
            padding: 0.75rem 1rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            gap: 0.75rem;
            align-items: center;
            background: var(--bg-secondary);
        }

        .filters select,
        .filters input[type="checkbox"] {
            background: var(--bg-tertiary);
            color: var(--text-primary);
            border: 1px solid var(--border);
            padding: 0.4rem 0.5rem;
            border-radius: 4px;
            font-size: 0.875rem;
        }

        .filters label {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            font-size: 0.875rem;
            color: var(--text-secondary);
        }

        /* Priority List */
        .priority-list {
            flex: 1;
            overflow-y: auto;
        }

        .priority-row {
            padding: 0.75rem 1rem;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            transition: background 0.15s;
        }

        .priority-row:hover {
            background: var(--bg-tertiary);
        }

        .priority-row.selected {
            background: var(--bg-tertiary);
            border-left: 3px solid var(--accent);
        }

        .priority-row .name {
            font-weight: 500;
            margin-bottom: 0.25rem;
        }

        .priority-row .meta {
            font-size: 0.8rem;
            color: var(--text-secondary);
            display: flex;
            gap: 0.75rem;
        }

        .type-badge {
            display: inline-block;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            font-size: 0.7rem;
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .type-badge.goal { background: #2e7d32; color: #c8e6c9; }
        .type-badge.obligation { background: #c62828; color: #ffcdd2; }
        .type-badge.capacity { background: #1565c0; color: #bbdefb; }
        .type-badge.accomplishment { background: #6a1b9a; color: #e1bee7; }
        .type-badge.practice { background: #ef6c00; color: #ffe0b2; }

        .status-indicator {
            color: var(--text-muted);
        }

        .status-indicator.active {
            color: var(--success);
        }

        /* Detail View */
        .detail-view {
            max-width: 700px;
        }

        .detail-header {
            margin-bottom: 1.5rem;
        }

        .detail-header h2 {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }

        .detail-header .meta {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .detail-section {
            margin-bottom: 1.5rem;
        }

        .detail-section h3 {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
        }

        .detail-section p {
            color: var(--text-primary);
        }

        /* Forms */
        .form-group {
            margin-bottom: 1rem;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 0.3rem;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 0.5rem;
            background: var(--bg-secondary);
            color: var(--text-primary);
            border: 1px solid var(--border);
            border-radius: 4px;
            font-size: 0.9rem;
            font-family: inherit;
        }

        .form-group textarea {
            min-height: 80px;
            resize: vertical;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--accent);
        }

        .btn {
            padding: 0.5rem 1rem;
            border: none;
            border-radius: 4px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: background 0.15s;
        }

        .btn-primary {
            background: var(--accent);
            color: white;
        }

        .btn-primary:hover {
            background: var(--accent-dim);
        }

        .btn-secondary {
            background: var(--bg-tertiary);
            color: var(--text-primary);
        }

        /* Links list (parents/children) */
        .links-list {
            list-style: none;
        }

        .links-list li {
            padding: 0.4rem 0;
            border-bottom: 1px solid var(--border);
        }

        .links-list a {
            color: var(--accent);
            text-decoration: none;
        }

        .links-list a:hover {
            text-decoration: underline;
        }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 3rem 1rem;
            color: var(--text-secondary);
        }

        .empty-state h3 {
            margin-bottom: 0.5rem;
        }

        /* Error state */
        .error {
            background: #c62828;
            color: white;
            padding: 1rem;
            border-radius: 4px;
        }

        /* HTMX loading indicator */
        .htmx-indicator {
            display: none;
        }

        .htmx-request .htmx-indicator {
            display: inline;
        }

        .htmx-request.htmx-indicator {
            display: inline;
        }
    </style>
</head>
<body>
    {% block body %}{% endblock %}
</body>
</html>
