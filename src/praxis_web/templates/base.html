<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Praxis - {% block title %}Priorities{% endblock %}</title>

    <!-- Favicon (environment-specific) -->
    <link rel="icon" type="image/svg+xml" href="/static/images/favicon-{{ praxis_env }}.svg">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,wght@0,400;0,500;0,600;1,400&family=Noto+Serif:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Styles -->
    <link rel="stylesheet" href="/static/css/main.css">

    <!-- Shepherd.js (tutorial) -->
    <link rel="stylesheet" href="/static/css/shepherd.css">

    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>

    <!-- SortableJS for drag-and-drop -->
    <script src="https://unpkg.com/sortablejs@1.15.2/Sortable.min.js"></script>
</head>
<body class="env-{{ praxis_env }}">
    {% block body %}{% endblock %}

    <!-- Chip component scripts -->
    {% include "partials/chips/chip_scripts.html" %}

    <!-- Tutorial (loads Shepherd.js, auto-starts for new users) -->
    <script src="/static/js/dist/tutorial.js"></script>
</body>
</html>
