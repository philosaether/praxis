{% extends "base.html" %}

{% block title %}Praxis{% endblock %}

{% block body %}
<div class="container">
    <!-- Left Pane -->
    <div class="left-pane">
        <div class="header">
            <h1>Praxis</h1>
            {% if user %}
            <div class="user-info">
                <span class="username">{{ user.username }}</span>
                <a href="/logout" class="logout-link">Logout</a>
            </div>
            {% else %}
            <a href="/login" class="login-link">Login</a>
            {% endif %}
        </div>

        <!-- Main Toggle: Tasks | Priorities -->
        <div class="filters">
            <div class="view-toggle">
                <button class="view-btn active"
                        id="tasks-view-btn"
                        hx-get="/tasks/list"
                        hx-target="#item-list"
                        onclick="setMode('tasks')">
                    Tasks
                </button>
                <button class="view-btn"
                        id="priorities-view-btn"
                        hx-get="/priorities/list"
                        hx-target="#item-list"
                        onclick="setMode('priorities')">
                    Priorities
                </button>
            </div>

            <!-- Task filters (shown by default) -->
            <div id="task-filters" class="filter-group">
                <select name="priority"
                        hx-get="/tasks/list"
                        hx-target="#item-list">
                    <option value="">All Priorities</option>
                    {% for p in priorities %}
                    <option value="{{ p.id }}">{{ p.name }}</option>
                    {% endfor %}
                </select>
            </div>

            <!-- Priority filters (hidden by default) -->
            <div id="priority-filters" class="filter-group" style="display: none;">
                <select name="type"
                        hx-get="/priorities/list"
                        hx-target="#item-list"
                        hx-include="[name='active']">
                    <option value="">All Types</option>
                    {% for t in priority_types %}
                    <option value="{{ t }}">{{ t|title }}</option>
                    {% endfor %}
                </select>

                <label>
                    <input type="checkbox"
                           name="active"
                           value="true"
                           hx-get="/priorities/list"
                           hx-target="#item-list"
                           hx-include="[name='type']">
                    Active only
                </label>
            </div>
        </div>

        <!-- Add New Item Bar -->
        <div class="add-new-bar">
            <div id="add-task-bar" style="display: flex;">
                <button class="btn btn-primary btn-sm"
                        hx-post="/tasks/new"
                        hx-target="#item-list"
                        hx-swap="afterbegin"
                        hx-on::after-request="loadNewTask(event)">
                    + New Task
                </button>
            </div>
            <div id="add-priority-bar" style="display: none;">
                <select id="new-priority-type" name="new-priority-type" class="priority-type-select">
                    {% for t in priority_types %}
                    <option value="{{ t }}">{{ t|title }}</option>
                    {% endfor %}
                </select>
                <button class="btn btn-primary btn-sm"
                        hx-post="/priorities/new"
                        hx-target="#item-list"
                        hx-swap="afterbegin"
                        hx-include="#new-priority-type"
                        hx-on::after-request="loadNewPriority(event)">
                    + New
                </button>
            </div>
        </div>

        <!-- Item List -->
        <div class="priority-list" id="item-list">
            {% include "partials/task_rows.html" %}
        </div>
    </div>

    <!-- Right Pane: Detail View -->
    <div class="right-pane" id="detail-pane">
        <div class="empty-state">
            <h3>Select an item</h3>
            <p>Click an item on the left to view details</p>
        </div>
    </div>
</div>

<script>
    window.setMode = function(mode) {
        // Toggle button states
        document.getElementById('tasks-view-btn').classList.toggle('active', mode === 'tasks');
        document.getElementById('priorities-view-btn').classList.toggle('active', mode === 'priorities');

        // Toggle filter visibility
        document.getElementById('priority-filters').style.display = mode === 'priorities' ? 'flex' : 'none';
        document.getElementById('task-filters').style.display = mode === 'tasks' ? 'flex' : 'none';

        // Toggle add-new bar visibility
        document.getElementById('add-task-bar').style.display = mode === 'tasks' ? 'flex' : 'none';
        document.getElementById('add-priority-bar').style.display = mode === 'priorities' ? 'flex' : 'none';

        // Update detail pane based on mode
        if (mode === 'priorities') {
            // Load tree view in detail pane
            htmx.ajax('GET', '/priorities/tree-pane', {target: '#detail-pane', swap: 'innerHTML'});
        } else {
            // Clear detail pane for tasks mode
            document.getElementById('detail-pane').innerHTML = '<div class="empty-state"><h3>Select an item</h3><p>Click an item on the left to view details</p></div>';
        }
    };

    window.selectTreeNode = function(element) {
        // Remove selected class from all tree nodes
        document.querySelectorAll('.tree-node-content.selected')
            .forEach(el => el.classList.remove('selected'));
        // Add selected class to clicked node
        element.classList.add('selected');
    };

    window.loadNewTask = function(event) {
        // Get the new task ID from the response header
        const taskId = event.detail.xhr.getResponseHeader('X-New-Item-Id');
        if (taskId) {
            // Select the new row
            const newRow = document.getElementById('task-row-' + taskId);
            if (newRow) selectRow(newRow);

            // Load the detail view
            htmx.ajax('GET', '/tasks/' + taskId, {target: '#detail-pane', swap: 'innerHTML'})
                .then(() => {
                    // Focus the title input after detail loads
                    setTimeout(() => {
                        const titleInput = document.querySelector('#detail-pane #title');
                        if (titleInput) {
                            titleInput.focus();
                            titleInput.select();
                        }
                    }, 100);
                });
        }
    };

    window.loadNewPriority = function(event) {
        // Get the new priority ID from the response header
        const priorityId = event.detail.xhr.getResponseHeader('X-New-Item-Id');
        if (priorityId) {
            // Select the new row
            const newRow = document.getElementById('priority-row-' + priorityId);
            if (newRow) selectRow(newRow);

            // Load the detail view
            htmx.ajax('GET', '/priorities/' + priorityId, {target: '#detail-pane', swap: 'innerHTML'})
                .then(() => {
                    // Focus the name input after detail loads
                    setTimeout(() => {
                        const nameInput = document.querySelector('#detail-pane #name');
                        if (nameInput) {
                            nameInput.focus();
                            nameInput.select();
                        }
                    }, 100);
                });
        }
    };

    window.selectRow = function(element) {
        // Remove selected class from all rows
        document.querySelectorAll('.task-row.selected, .priority-row.selected')
            .forEach(el => el.classList.remove('selected'));
        // Add selected class to clicked row
        element.classList.add('selected');
    };
</script>
{% endblock %}
