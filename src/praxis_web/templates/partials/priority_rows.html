{% for p in priorities %}
<div class="priority-row{% if p.is_shared_with_me %} shared-with-me{% endif %}"
     id="priority-row-{{ p.id }}"
     hx-get="/priorities/{{ p.id }}"
     hx-target="#detail-pane"
     hx-swap="innerHTML"
     hx-push-url="true"
     onclick="selectRow(this)">
    <div class="name">{{ p.name }}</div>
    <div class="meta">
        {% if p.is_shared_with_me or (p.share_count and p.share_count > 0) %}
        <span class="share-badge" title="{% if p.is_shared_with_me %}Shared with you{% else %}Shared{% endif %}">&#x263A;</span>
        {% endif %}
        <span class="type-badge {{ p.priority_type }}">{{ p.priority_type|upper }}</span>
        <span class="status-indicator {% if p.status == 'active' %}active{% endif %}">
            {{ p.status }}
        </span>
    </div>
</div>
{% else %}
<div class="empty-state">
    <h3>No priorities found</h3>
    <p>Try adjusting your filters</p>
</div>
{% endfor %}
