{% for p in priorities %}
<div class="priority-row"
     id="priority-row-{{ p.id }}"
     hx-get="/priorities/{{ p.id }}"
     hx-target="#detail-pane"
     hx-swap="innerHTML"
     onclick="selectRow(this)">
    <div class="name">{{ p.name }}</div>
    <div class="meta">
        <span class="type-badge {{ p.priority_type }}">{{ p.priority_type[:3] }}</span>
        <span class="status-indicator {% if p.status == 'active' %}active{% endif %}">
            {{ p.status }}
        </span>
        <span>{{ p.id }}</span>
    </div>
</div>
{% else %}
<div class="empty-state">
    <h3>No priorities found</h3>
    <p>Try adjusting your filters</p>
</div>
{% endfor %}
