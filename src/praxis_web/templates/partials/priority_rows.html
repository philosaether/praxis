{% for p in priorities %}
<div class="priority-row{% if p.is_shared_with_me %} shared-with-me{% endif %}"
     id="priority-row-{{ p.id }}"
     hx-get="/priorities/{{ p.id }}"
     hx-target="#detail-content"
     hx-swap="innerHTML"
     hx-push-url="true"
     onclick="selectRow(this)">
    <div class="name">{{ p.name }}</div>
    <div class="meta">
        {% if p.is_shared_with_me or (p.share_count and p.share_count > 0) %}
        <span class="icon icon--sm" style="color: #2e5a30" title="{% if p.is_shared_with_me %}Shared with you{% else %}Shared{% endif %}">handshake</span>
        {% endif %}
        <span class="pill pill--{{ p.priority_type }}">{{ p.priority_type|upper }}</span>
        <span class="pill pill--xs pill--status-{{ p.status }}">
            {{ p.status }}
        </span>
    </div>
</div>
{% else %}
<div class="empty-state">
    <h3>No priorities found</h3>
    <p>Try adjusting your filters</p>
</div>
{% endfor %}
