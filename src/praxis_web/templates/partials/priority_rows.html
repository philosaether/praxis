{% for p in priorities %}
<div class="priority-row{% if p.is_shared_with_me %} shared-with-me{% endif %}"
     id="priority-row-{{ p.id }}"
     hx-get="/priorities/{{ p.id }}"
     hx-target="#detail-pane"
     hx-swap="innerHTML"
     onclick="selectRow(this)">
    <div class="name">
        {{ p.name }}
        {% if p.is_shared_with_me %}
        <span class="share-indicator shared-with-me" title="Shared with you">&#x1F517;</span>
        {% elif p.share_count and p.share_count > 0 %}
        <span class="share-indicator shared-by-me" title="Shared with {{ p.share_count }} other(s)">&#x1F91D;</span>
        {% endif %}
    </div>
    <div class="meta">
        <span class="type-badge {{ p.priority_type }}">{{ p.priority_type[:3] }}</span>
        <span class="status-indicator {% if p.status == 'active' %}active{% endif %}">
            {{ p.status }}
        </span>
        <span>{{ p.id }}</span>
    </div>
</div>
{% else %}
<div class="empty-state">
    <h3>No priorities found</h3>
    <p>Try adjusting your filters</p>
</div>
{% endfor %}
