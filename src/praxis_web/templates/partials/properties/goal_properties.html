{# Goal properties form - always editable #}
{# Expects: priority, priority_statuses, all_priorities, parents, priority_types #}

<div class="properties-section priority-properties goal-properties">
    <form hx-post="/priorities/{{ priority.id }}/properties"
          hx-target="#properties-section"
          hx-swap="outerHTML">

        <!-- Type selector -->
        <div class="property-row">
            <label for="priority_type">Type</label>
            <select id="priority_type"
                    name="new_priority_type"
                    class="property-input type-select"
                    hx-post="/priorities/{{ priority.id }}/change-type"
                    hx-target="#properties-section"
                    hx-swap="outerHTML"
                    hx-confirm="Changing type will clear type-specific fields. Continue?">
                {% for t in priority_types %}
                <option value="{{ t }}" {% if t == 'goal' %}selected{% endif %}>
                    {{ t|title }}
                </option>
                {% endfor %}
            </select>
        </div>

        <!-- Name -->
        <div class="property-row">
            <label for="name">Name</label>
            <input type="text"
                   id="name"
                   name="name"
                   value="{{ priority.name }}"
                   required
                   autocomplete="off"
                   class="property-input title-input">
        </div>

        <!-- Status -->
        <div class="property-row">
            <label for="status">Status</label>
            <select id="status" name="status" class="property-input">
                {% for s in priority_statuses %}
                <option value="{{ s }}" {% if priority.status == s %}selected{% endif %}>
                    {{ s }}
                </option>
                {% endfor %}
            </select>
        </div>

        <!-- Parent -->
        <div class="property-row">
            <label for="parent_id">Parent</label>
            <select id="parent_id" name="parent_id" class="property-input">
                <option value="">None</option>
                {% for p in all_priorities %}
                {% if p.id != priority.id %}
                <option value="{{ p.id }}" {% if parents and p.id in parents|map(attribute='id')|list %}selected{% endif %}>
                    {{ p.name }} ({{ p.priority_type }})
                </option>
                {% endif %}
                {% endfor %}
            </select>
        </div>

        <!-- Agent Context -->
        <div class="property-row">
            <label for="agent_context">Context</label>
            <textarea id="agent_context"
                      name="agent_context"
                      rows="3"
                      class="property-input"
                      placeholder="Context for AI agent...">{{ priority.agent_context or '' }}</textarea>
        </div>

        <!-- Goal-specific: Success Criteria -->
        <div class="property-row">
            <label for="success_criteria">Success Criteria</label>
            <textarea id="success_criteria"
                      name="success_criteria"
                      rows="3"
                      class="property-input"
                      placeholder="How will you know when this is done?">{{ priority.success_criteria or '' }}</textarea>
        </div>

        <!-- Goal-specific: Progress -->
        <div class="property-row">
            <label for="progress">Progress</label>
            <input type="text"
                   id="progress"
                   name="progress"
                   value="{{ priority.progress or '' }}"
                   class="property-input"
                   placeholder="e.g., 3/10, 70%">
        </div>

        <!-- Goal-specific: Due Date -->
        <div class="property-row">
            <label for="due_date">Due Date</label>
            <input type="date"
                   id="due_date"
                   name="due_date"
                   value="{{ priority.due_date or '' }}"
                   class="property-input">
        </div>

        <!-- Save Button -->
        <div class="property-actions">
            <button type="submit" class="btn btn-primary">Save</button>
            <span class="save-status" id="save-status"></span>
            <button type="button"
                    class="btn btn-danger"
                    hx-delete="/priorities/{{ priority.id }}"
                    hx-swap="none"
                    hx-confirm="Delete '{{ priority.name }}'? This cannot be undone."
                    hx-on::after-request="if(event.detail.successful) { htmx.ajax('GET', '/priorities/tree-pane', {target: '#detail-pane', swap: 'innerHTML'}); }">
                Delete
            </button>
        </div>

        <div id="property-errors" class="property-errors"></div>
    </form>

    <!-- Metadata -->
    <div class="property-meta">
        <span class="meta-item">{{ priority.id }}</span>
        {% if priority.created_at %}
        <span class="meta-item">Created: {{ priority.created_at }}</span>
        {% endif %}
        {% if priority.updated_at %}
        <span class="meta-item">Updated: {{ priority.updated_at }}</span>
        {% endif %}
    </div>
</div>
