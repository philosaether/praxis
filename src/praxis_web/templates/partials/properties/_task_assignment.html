{# Priority assignment - include in priority property forms #}
{# Expects: priority, friends (list of {entity_id, username}) #}
{# Only shown to owner #}

{% if priority.is_owner %}
<!-- Priority Assignment -->
<div class="property-row">
    <label for="assigned_to_entity_id">Assigned to</label>
    <select name="assigned_to_entity_id" id="assigned_to_entity_id" class="property-input">
        <option value="">Unassigned</option>
        {% for friend in friends %}
        <option value="{{ friend.entity_id }}" {% if priority.assigned_to_entity_id == friend.entity_id %}selected{% endif %}>
            {{ friend.username }}
        </option>
        {% endfor %}
    </select>
</div>
{% endif %}
