{# Task properties form - always editable #}
{# Expects: task, priorities, task_statuses #}

<div class="properties-section task-properties">
    <form hx-post="/tasks/{{ task.id }}/properties"
          hx-target="#properties-section"
          hx-swap="outerHTML">

        <!-- Title -->
        <div class="property-row">
            <label for="title">Title</label>
            <input type="text"
                   id="title"
                   name="title"
                   value="{{ task.title }}"
                   required
                   class="property-input title-input">
        </div>

        <!-- Priority -->
        <div class="property-row">
            <label for="priority_id">Priority</label>
            <select id="priority_id" name="priority_id" class="property-input">
                <option value="">None</option>
                {% for p in priorities %}
                <option value="{{ p.id }}" {% if task.priority_id == p.id %}selected{% endif %}>
                    {{ p.name }}
                </option>
                {% endfor %}
            </select>
        </div>

        <!-- Status -->
        <div class="property-row">
            <label for="status">Status</label>
            <select id="status" name="status" class="property-input">
                {% for s in task_statuses %}
                <option value="{{ s }}" {% if task.status == s %}selected{% endif %}>
                    {{ s }}
                </option>
                {% endfor %}
            </select>
        </div>

        <!-- Due Date -->
        <div class="property-row">
            <label for="due_date">Due Date</label>
            <input type="date"
                   id="due_date"
                   name="due_date"
                   value="{{ task.due_date or '' }}"
                   class="property-input">
        </div>

        <!-- Save Button -->
        <div class="property-actions">
            <button type="submit" class="btn btn-primary">Save</button>
            <span class="save-status" id="save-status"></span>
            <button type="button"
                    class="btn btn-danger"
                    hx-delete="/tasks/{{ task.id }}"
                    hx-swap="none"
                    hx-confirm="Delete '{{ task.title }}'? This cannot be undone."
                    hx-on::after-request="if(event.detail.successful) { document.getElementById('task-row-{{ task.id }}')?.remove(); document.getElementById('detail-pane').innerHTML = '<div class=\'empty-state\'><h3>Select an item</h3><p>Click an item on the left to view details</p></div>'; }">
                Delete
            </button>
        </div>

        <!-- Validation errors will show here -->
        <div id="property-errors" class="property-errors"></div>
    </form>

    <!-- Metadata (read-only) -->
    <div class="property-meta">
        <span class="meta-item">#{{ task.id }}</span>
        {% if task.created_at %}
        <span class="meta-item">Created: {{ task.created_at }}</span>
        {% endif %}
    </div>
</div>
