{# New priority creation form #}
{# Expects: priority_types, priority_statuses, all_priorities #}

<div class="detail-view">
    <div id="properties-section">
        <div class="properties-section priority-properties">
            <form hx-post="/priorities/create"
                  hx-target="#detail-pane"
                  hx-swap="innerHTML">

                <!-- Type selector -->
                <div class="property-row">
                    <label for="priority_type">Type</label>
                    <select id="priority_type"
                            name="priority_type"
                            class="property-input"
                            hx-get="/priorities/new/fields"
                            hx-target="#type-specific-fields"
                            hx-swap="innerHTML"
                            hx-trigger="change">
                        {% for t in priority_types %}
                        <option value="{{ t }}" {% if t == 'accomplishment' %}selected{% endif %}>
                            {{ t|title }}
                        </option>
                        {% endfor %}
                    </select>
                </div>

                <!-- Name (required) -->
                <div class="property-row">
                    <label for="name">Name</label>
                    <input type="text"
                           id="name"
                           name="name"
                           placeholder="Priority name"
                           required
                           autofocus
                           class="property-input title-input">
                </div>

                <!-- Status -->
                <div class="property-row">
                    <label for="status">Status</label>
                    <select id="status" name="status" class="property-input">
                        {% for s in priority_statuses %}
                        <option value="{{ s }}" {% if s == 'active' %}selected{% endif %}>
                            {{ s }}
                        </option>
                        {% endfor %}
                    </select>
                </div>

                <!-- Parent -->
                <div class="property-row">
                    <label for="parent_id">Parent</label>
                    <select id="parent_id" name="parent_id" class="property-input">
                        <option value="">None</option>
                        {% for p in all_priorities %}
                        <option value="{{ p.id }}">
                            {{ p.name }} ({{ p.priority_type }})
                        </option>
                        {% endfor %}
                    </select>
                </div>

                <!-- Agent Context -->
                <div class="property-row">
                    <label for="agent_context">Context</label>
                    <textarea id="agent_context"
                              name="agent_context"
                              rows="3"
                              class="property-input"
                              placeholder="Context for AI agent..."></textarea>
                </div>

                <!-- Type-specific fields (dynamic) -->
                <div id="type-specific-fields">
                    {% include "partials/type_fields/accomplishment_fields.html" %}
                </div>

                <!-- Actions -->
                <div class="property-actions">
                    <button type="submit" class="btn btn-primary">Create Priority</button>
                    <button type="button"
                            class="btn btn-secondary"
                            onclick="document.getElementById('detail-pane').innerHTML = '<div class=\'empty-state\'><h3>Select an item</h3><p>Click an item on the left to view details</p></div>'; htmx.ajax('GET', '/priorities/tree-pane', {target: '#detail-pane', swap: 'innerHTML'});">
                        Cancel
                    </button>
                </div>

                <!-- Validation errors -->
                <div id="property-errors" class="property-errors"></div>
            </form>
        </div>
    </div>

    <!-- Notes Section (placeholder for new priority) -->
    <div class="notes-section">
        <div class="notes-header">
            <h3>Notes</h3>
        </div>
        <div class="notes-content">
            <div class="notes-display empty">
                <p class="empty-notes">Save the priority first to add notes.</p>
            </div>
        </div>
    </div>
</div>
