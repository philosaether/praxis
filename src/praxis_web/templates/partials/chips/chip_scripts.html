{# Chip component JavaScript - include once in base template #}
<script>
(function() {
  // Track currently open popup
  let openPopup = null;
  let openTrigger = null;

  // Toggle a chip popup open/closed
  window.toggleChipPopup = function(trigger) {
    const chip = trigger.closest('.chip');
    const popup = chip.querySelector('.chip-popup');
    const isOpen = popup.classList.contains('open');

    // Close any currently open popup first
    closeAllChipPopups();

    if (!isOpen) {
      popup.classList.add('open');
      trigger.setAttribute('aria-expanded', 'true');
      openPopup = popup;
      openTrigger = trigger;

      // Focus first focusable element in popup
      const firstFocusable = popup.querySelector('button, input, select, [tabindex]:not([tabindex="-1"])');
      if (firstFocusable) {
        firstFocusable.focus();
      }
    }
  };

  // Close all open chip popups
  window.closeAllChipPopups = function() {
    if (openPopup) {
      openPopup.classList.remove('open');
    }
    if (openTrigger) {
      openTrigger.setAttribute('aria-expanded', 'false');
    }
    openPopup = null;
    openTrigger = null;
  };

  // Update a chip's value and display
  window.updateChip = function(chip, value, display) {
    if (typeof chip === 'string') {
      chip = document.querySelector(`.chip[data-chip="${chip}"]`);
    }
    if (!chip) return;

    const input = chip.querySelector('input[type="hidden"]');
    const textEl = chip.querySelector('.chip-trigger__text');

    if (input) input.value = value;
    if (textEl) textEl.textContent = display || value;

    closeAllChipPopups();
  };

  // Select an option in a chip popup (for simple option lists)
  window.selectChipOption = function(optionEl, value, display) {
    const popup = optionEl.closest('.chip-popup');
    const chip = optionEl.closest('.chip');

    // Update selected state
    popup.querySelectorAll('.chip-popup__option').forEach(opt => {
      opt.classList.remove('selected');
    });
    optionEl.classList.add('selected');

    // Update chip value
    updateChip(chip, value, display || optionEl.textContent.trim());
  };

  // Close popup when clicking outside
  document.addEventListener('click', function(e) {
    if (!openPopup) return;

    const clickedInPopup = openPopup.contains(e.target);
    const clickedOnTrigger = openTrigger && openTrigger.contains(e.target);

    if (!clickedInPopup && !clickedOnTrigger) {
      closeAllChipPopups();
    }
  });

  // Close popup on Escape key
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape' && openPopup) {
      closeAllChipPopups();
      if (openTrigger) openTrigger.focus();
    }
  });

  // Select an interval option (handles spawning day chip if needed)
  window.selectIntervalOption = function(optionEl) {
    const popup = optionEl.closest('.chip-popup');
    const chip = optionEl.closest('.chip');
    const sentence = chip.closest('.chip-sentence');

    const value = optionEl.dataset.value;
    const display = optionEl.dataset.display;
    const spawns = optionEl.dataset.spawns;

    // Update selected state
    popup.querySelectorAll('.chip-popup__option').forEach(opt => {
      opt.classList.remove('selected');
    });
    optionEl.classList.add('selected');

    // Update chip value and display
    updateChip(chip, value, display);

    // Remove placeholder styling
    const trigger = chip.querySelector('.chip-trigger');
    trigger.classList.remove('chip-trigger--placeholder');

    // Handle spawning
    const existingOnText = sentence.querySelector('.chip-spawned-on');
    const existingDayChip = sentence.querySelector('[data-chip-type="day"]');

    if (spawns === 'day') {
      // Need to spawn day chip if not present
      if (!existingDayChip) {
        // Create "on" text
        const onText = document.createElement('span');
        onText.className = 'chip-sentence__text chip-spawned-on';
        onText.textContent = 'on';

        // Create placeholder for day chip
        const dayChipContainer = document.createElement('span');
        dayChipContainer.className = 'chip-spawned-day';

        // Insert after interval chip
        chip.insertAdjacentElement('afterend', onText);
        onText.insertAdjacentElement('afterend', dayChipContainer);

        // Fetch day chip partial from server (single source of truth)
        fetch('/partials/chips/day?name=days&value=&period=weeks')
          .then(response => response.text())
          .then(html => {
            dayChipContainer.outerHTML = html;
          });
      }
      // Remove any custom interval chips
      removeCustomIntervalChips(sentence);
    } else if (spawns === 'custom') {
      // Remove simple day chip first
      if (existingOnText) existingOnText.remove();
      if (existingDayChip) existingDayChip.remove();
      const pendingPlaceholder = sentence.querySelector('.chip-spawned-day');
      if (pendingPlaceholder) pendingPlaceholder.remove();

      // Spawn custom interval chips: [number] [period] on [day]
      spawnCustomIntervalChips(chip, sentence);
    } else {
      // Remove day chip if present
      if (existingOnText) existingOnText.remove();
      if (existingDayChip) existingDayChip.remove();
      // Also remove any pending placeholder
      const pendingPlaceholder = sentence.querySelector('.chip-spawned-day');
      if (pendingPlaceholder) pendingPlaceholder.remove();
      // Remove custom interval chips
      removeCustomIntervalChips(sentence);
    }
  };

  // Spawn custom interval chips: "Every [2] [weeks] on [days]"
  function spawnCustomIntervalChips(intervalChip, sentence) {
    // Check if already spawned
    if (sentence.querySelector('[data-chip-type="number"]')) return;

    // Create container for custom chips (replaces interval chip display)
    const numberContainer = document.createElement('span');
    numberContainer.className = 'chip-spawned-number';

    const periodContainer = document.createElement('span');
    periodContainer.className = 'chip-spawned-period';

    const onText = document.createElement('span');
    onText.className = 'chip-sentence__text chip-spawned-on';
    onText.textContent = 'on';

    const dayContainer = document.createElement('span');
    dayContainer.className = 'chip-spawned-day';

    // Insert after interval chip (which will be hidden)
    intervalChip.insertAdjacentElement('afterend', numberContainer);
    numberContainer.insertAdjacentElement('afterend', periodContainer);
    periodContainer.insertAdjacentElement('afterend', onText);
    onText.insertAdjacentElement('afterend', dayContainer);

    // Hide the original interval chip
    intervalChip.style.display = 'none';

    // Fetch chips from server
    Promise.all([
      fetch('/partials/chips/number?name=count&value=2').then(r => r.text()),
      fetch('/partials/chips/period?name=period&value=weeks').then(r => r.text()),
      fetch('/partials/chips/day?name=days&value=&period=weeks').then(r => r.text())
    ]).then(([numberHtml, periodHtml, dayHtml]) => {
      numberContainer.outerHTML = numberHtml;
      periodContainer.outerHTML = periodHtml;
      dayContainer.outerHTML = dayHtml;
    });
  }

  // Remove custom interval chips
  function removeCustomIntervalChips(sentence) {
    const numberChip = sentence.querySelector('[data-chip-type="number"]');
    const periodChip = sentence.querySelector('[data-chip-type="period"]');
    const intervalChip = sentence.querySelector('[data-chip-type="interval"]');

    if (numberChip) numberChip.remove();
    if (periodChip) periodChip.remove();

    // Also remove containers
    sentence.querySelectorAll('.chip-spawned-number, .chip-spawned-period').forEach(el => el.remove());

    // Show the interval chip again
    if (intervalChip) intervalChip.style.display = '';
  }

  // Toggle a day option on/off (weekly mode)
  window.toggleDayOption = function(optionEl) {
    const isSelected = optionEl.classList.toggle('selected');
    const checkEl = optionEl.querySelector('.chip-popup__check');
    if (checkEl) {
      checkEl.textContent = isSelected ? '\u2713' : '';
    }
    updateDayChipFromOptions(optionEl.closest('.chip'));
  };

  // Number chip: adjust value by delta
  window.adjustNumberChip = function(btn, delta) {
    const input = btn.closest('.chip-popup__number-input').querySelector('.chip-popup__number-field');
    const min = parseInt(input.min) || 1;
    const max = parseInt(input.max) || 52;
    let value = parseInt(input.value) || 1;

    value = Math.max(min, Math.min(max, value + delta));
    input.value = value;
    setNumberChip(input);
  };

  // Number chip: set value from input (doesn't close popup)
  window.setNumberChip = function(input) {
    const chip = input.closest('.chip');
    const value = input.value;

    // Update without closing popup
    const hiddenInput = chip.querySelector('input[type="hidden"]');
    const textEl = chip.querySelector('.chip-trigger__text');

    if (hiddenInput) hiddenInput.value = value;
    if (textEl) textEl.textContent = value;
  };

  // Period chip: select period and update day chip mode
  window.selectPeriodOption = function(optionEl) {
    const popup = optionEl.closest('.chip-popup');
    const chip = optionEl.closest('.chip');
    const sentence = chip.closest('.chip-sentence');
    const value = optionEl.dataset.value;

    // Update selected state
    popup.querySelectorAll('.chip-popup__option').forEach(opt => {
      opt.classList.remove('selected');
    });
    optionEl.classList.add('selected');

    // Update chip
    updateChip(chip, value, value);

    // Handle day chip based on period
    const existingDayChip = sentence.querySelector('[data-chip-type="day"]');
    const existingOnText = sentence.querySelector('.chip-spawned-on');

    if (value === 'days') {
      // Remove day chip for "days" period
      if (existingDayChip) existingDayChip.remove();
      if (existingOnText) existingOnText.remove();
    } else {
      // Spawn or update day chip with correct mode
      if (existingDayChip) {
        // Replace with new chip for new period
        const dayContainer = document.createElement('span');
        dayContainer.className = 'chip-spawned-day';
        existingDayChip.replaceWith(dayContainer);

        fetch(`/partials/chips/day?name=days&value=&period=${value}`)
          .then(r => r.text())
          .then(html => {
            dayContainer.outerHTML = html;
          });
      } else if (!existingOnText) {
        // Need to spawn day chip
        const onText = document.createElement('span');
        onText.className = 'chip-sentence__text chip-spawned-on';
        onText.textContent = 'on';

        const dayContainer = document.createElement('span');
        dayContainer.className = 'chip-spawned-day';

        chip.insertAdjacentElement('afterend', onText);
        onText.insertAdjacentElement('afterend', dayContainer);

        fetch(`/partials/chips/day?name=days&value=&period=${value}`)
          .then(r => r.text())
          .then(html => {
            dayContainer.outerHTML = html;
          });
      }
    }
  };

  // Day chip (monthly+): switch between Date and Weekday modes
  window.switchDayMode = function(tabEl, mode) {
    const popup = tabEl.closest('.chip-popup');

    // Update tab states
    popup.querySelectorAll('.chip-popup__tab').forEach(tab => {
      tab.classList.toggle('chip-popup__tab--active', tab.dataset.mode === mode);
    });

    // Update mode panel visibility
    popup.querySelectorAll('.chip-popup__mode').forEach(panel => {
      const isDate = panel.classList.contains('chip-popup__mode--date');
      const isWeekday = panel.classList.contains('chip-popup__mode--weekday');
      panel.classList.toggle('chip-popup__mode--active',
        (mode === 'date' && isDate) || (mode === 'weekday' && isWeekday)
      );
    });
  };

  // Day chip (monthly+ date mode): select a specific date
  window.selectDateOption = function(optionEl) {
    const popup = optionEl.closest('.chip-popup');
    const chip = optionEl.closest('.chip');
    const value = optionEl.dataset.value;

    // Clear all date selections
    popup.querySelectorAll('.chip-popup__options--dates .chip-popup__option, .chip-popup__date-btn').forEach(opt => {
      opt.classList.remove('selected');
    });
    optionEl.classList.add('selected');

    // Format display
    let display = value;
    if (!isNaN(value)) {
      const num = parseInt(value);
      const suffix = (num === 1 || num === 21) ? 'st' : (num === 2 || num === 22) ? 'nd' : (num === 3 || num === 23) ? 'rd' : 'th';
      display = `the ${num}${suffix}`;
    } else {
      display = `the ${value}`;
    }

    updateChip(chip, value, display);
  };

  // Day chip (monthly+ weekday mode): select ordinal (first, second, etc.)
  window.selectOrdinalOption = function(optionEl) {
    const popup = optionEl.closest('.chip-popup');

    // Update ordinal selection
    popup.querySelectorAll('.chip-popup__ordinal-row .chip-popup__option').forEach(opt => {
      opt.classList.remove('selected');
    });
    optionEl.classList.add('selected');

    updateWeekdayModeChip(optionEl.closest('.chip'));
  };

  // Day chip (monthly+ weekday mode): select weekday
  window.selectWeekdayOption = function(optionEl) {
    const popup = optionEl.closest('.chip-popup');

    // Update weekday selection
    popup.querySelectorAll('.chip-popup__mode--weekday .chip-popup__options--days .chip-popup__option').forEach(opt => {
      opt.classList.remove('selected');
    });
    optionEl.classList.add('selected');

    updateWeekdayModeChip(optionEl.closest('.chip'));
  };

  // Helper: update chip from ordinal + weekday selections
  function updateWeekdayModeChip(chip) {
    const popup = chip.querySelector('.chip-popup');
    const ordinalEl = popup.querySelector('.chip-popup__ordinal-row .chip-popup__option.selected');
    const weekdayEl = popup.querySelector('.chip-popup__mode--weekday .chip-popup__options--days .chip-popup__option.selected');

    if (ordinalEl && weekdayEl) {
      const ordinal = ordinalEl.dataset.ordinal;
      const weekday = weekdayEl.dataset.weekday;
      const value = `${ordinal} ${weekday}`;
      const display = `the ${ordinal} ${weekday.charAt(0).toUpperCase() + weekday.slice(1)}`;
      updateChip(chip, value, display);
    }
  }

  // Update day chip from selected options
  window.updateDayChipFromOptions = function(chip) {
    const popup = chip.querySelector('.chip-popup');
    const options = popup.querySelectorAll('.chip-popup__option--day');

    // Gather selected days in order
    const dayOrder = ['monday','tuesday','wednesday','thursday','friday','saturday','sunday'];
    const selected = [];

    options.forEach(opt => {
      if (opt.classList.contains('selected')) {
        selected.push(opt.dataset.value);
      }
    });

    // Sort by day order
    selected.sort((a, b) => dayOrder.indexOf(a) - dayOrder.indexOf(b));

    const value = selected.join(',');
    const display = selected.length > 0 ? selected.join(', ') : 'one or more days';

    // Update chip
    const input = chip.querySelector('input[type="hidden"]');
    const textEl = chip.querySelector('.chip-trigger__text');
    const trigger = chip.querySelector('.chip-trigger');

    if (input) input.value = value;
    if (textEl) textEl.textContent = display;

    // Toggle placeholder styling
    if (selected.length > 0) {
      trigger.classList.remove('chip-trigger--placeholder');
    } else {
      trigger.classList.add('chip-trigger--placeholder');
    }
  };
})();
</script>
