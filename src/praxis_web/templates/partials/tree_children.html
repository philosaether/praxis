{% for child in children %}
<div class="tree-node">
    <div class="tree-node-content"
         hx-get="/priorities/{{ child.id }}"
         hx-target="#detail-pane"
         hx-swap="innerHTML">
        {% set child_ids = graph.children.get(child.id) %}
        {% if child_ids %}
        <span class="tree-toggle"
              hx-get="/priorities/tree/{{ child.id }}/children"
              hx-target="#children-{{ child.id }}"
              hx-swap="innerHTML"
              onclick="event.stopPropagation(); this.classList.toggle('expanded');">
            <span class="chevron">+</span>
        </span>
        {% else %}
        <span class="tree-toggle-spacer"></span>
        {% endif %}
        <span class="type-badge {{ child.priority_type }}">{{ child.priority_type[:3] }}</span>
        <span class="tree-node-name">{{ child.name }}</span>
        <span class="tree-node-id">{{ child.id }}</span>
    </div>
    <div class="tree-children" id="children-{{ child.id }}">
        <!-- Children loaded via HTMX when expanded -->
    </div>
</div>
{% endfor %}
