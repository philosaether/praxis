<div class="settings-panel">
    <h2>Account</h2>

    <div class="settings-section">
        <h3>Username</h3>
        <div class="settings-field">
            <span class="pill pill--type">{{ user.username }}</span>
        </div>
    </div>

    <div class="settings-section">
        <h3>Change Password</h3>

        {% if error %}
        <div class="settings-message settings-message--error">{{ error }}</div>
        {% endif %}
        {% if success %}
        <div class="settings-message settings-message--success">{{ success }}</div>
        {% endif %}

        <form hx-post="/settings/account/password"
              hx-target="#detail-content"
              hx-swap="innerHTML"
              class="settings-form">
            <div class="form-group">
                <label for="current_password">Current password</label>
                <input type="password" id="current_password" name="current_password" required
                       autocomplete="current-password">
            </div>
            <div class="form-group">
                <label for="new_password">New password</label>
                <input type="password" id="new_password" name="new_password" required
                       minlength="8" autocomplete="new-password">
            </div>
            <div class="form-group">
                <label for="confirm_password">Confirm new password</label>
                <input type="password" id="confirm_password" name="confirm_password" required
                       minlength="8" autocomplete="new-password">
            </div>
            <button type="submit" class="btn">Change Password</button>
        </form>
    </div>
</div>
