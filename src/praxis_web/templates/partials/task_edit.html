<div class="detail-view">
    <form hx-post="/tasks/{{ task.id }}"
          hx-target="#detail-pane"
          hx-swap="innerHTML">

        <div class="detail-header">
            <div class="form-group">
                <label for="title">Title</label>
                <input type="text"
                       id="title"
                       name="title"
                       value="{{ task.title }}"
                       required>
            </div>
        </div>

        <!-- Priority -->
        <div class="form-group">
            <label for="priority_id">Priority</label>
            <select id="priority_id" name="priority_id">
                <option value="">None</option>
                {% for p in priorities %}
                <option value="{{ p.id }}" {% if task.priority_id == p.id %}selected{% endif %}>
                    {{ p.name }}
                </option>
                {% endfor %}
            </select>
        </div>

        <!-- Status -->
        <div class="form-group">
            <label for="status">Status</label>
            <select id="status" name="status">
                {% for s in task_statuses %}
                <option value="{{ s }}" {% if task.status == s %}selected{% endif %}>
                    {{ s }}
                </option>
                {% endfor %}
            </select>
        </div>

        <!-- Notes -->
        <div class="form-group">
            <label for="notes">Notes</label>
            <textarea id="notes"
                      name="notes"
                      placeholder="Additional details...">{{ task.notes or '' }}</textarea>
        </div>

        <!-- Due Date -->
        <div class="form-group">
            <label for="due_date">Due Date</label>
            <input type="date"
                   id="due_date"
                   name="due_date"
                   value="{{ task.due_date or '' }}">
        </div>

        <!-- Actions -->
        <div style="display: flex; gap: 0.75rem; margin-top: 1.5rem;">
            <button type="submit" class="btn btn-primary">Save</button>
            <button type="button"
                    class="btn btn-secondary"
                    hx-get="/tasks/{{ task.id }}"
                    hx-target="#detail-pane"
                    hx-swap="innerHTML">
                Cancel
            </button>
        </div>
    </form>
</div>
