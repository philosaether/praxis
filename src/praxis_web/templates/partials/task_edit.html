{# Task edit mode - editable form #}
{# Expects: task, priorities #}

<div class="detail-view">
    <div class="properties-section task-properties">
        <form hx-post="/tasks/{{ task.id }}/properties"
              hx-target="#detail-pane"
              hx-swap="innerHTML">

            <!-- Name -->
            <div class="property-row">
                <label for="name">Name</label>
                <input type="text"
                       id="name"
                       name="name"
                       value="{{ task.name }}"
                       required
                       autofocus
                       autocomplete="off"
                       class="property-input title-input">
            </div>

            <!-- Priority -->
            <div class="property-row">
                <label for="priority_id">Priority</label>
                <select id="priority_id" name="priority_id" class="property-input">
                    <option value="">Inbox (no priority)</option>
                    {% for p in priorities %}
                    <option value="{{ p.id }}" {% if task.priority_id == p.id %}selected{% endif %}>
                        [{{ p.priority_type[:3]|upper }}] {{ p.name }}
                    </option>
                    {% endfor %}
                </select>
            </div>

            <!-- Due Date -->
            <div class="property-row">
                <label for="due_date">Due Date</label>
                <input type="date"
                       id="due_date"
                       name="due_date"
                       value="{{ task.due_date or '' }}"
                       class="property-input">
            </div>

            <!-- Notes -->
            <div class="property-row">
                <label for="notes">Notes</label>
                <textarea id="notes"
                          name="notes"
                          rows="6"
                          class="property-input"
                          placeholder="Add notes... (supports Markdown)">{{ task.notes_raw or task.notes or '' }}</textarea>
            </div>

            <!-- Actions -->
            <div class="property-actions">
                <div class="actions-left">
                    <button type="submit" class="btn btn-primary">Save</button>
                    <button type="button"
                            class="btn btn-secondary"
                            hx-get="/tasks/{{ task.id }}"
                            hx-target="#detail-pane"
                            hx-swap="innerHTML">
                        Cancel
                    </button>
                </div>
                <div class="actions-right">
                    <button type="button"
                            class="btn btn-danger"
                            hx-delete="/tasks/{{ task.id }}"
                            hx-swap="none"
                            hx-confirm="Delete '{{ task.name }}'? This cannot be undone."
                            hx-on::after-request="if(event.detail.successful) { document.getElementById('task-row-{{ task.id }}')?.remove(); document.getElementById('detail-pane').innerHTML = '<div class=\'empty-state\'><h3>Select an item</h3><p>Click an item on the left to view details</p></div>'; }">
                        Delete
                    </button>
                </div>
            </div>

            <!-- Validation errors -->
            <div id="property-errors" class="property-errors"></div>
        </form>

        <!-- Metadata (read-only) -->
        <div class="property-meta">
            <span class="meta-item">#{{ task.id }}</span>
            {% if task.created_at %}
            <span class="meta-item">Created: {{ task.created_at }}</span>
            {% endif %}
        </div>
    </div>
</div>
