{% for task in tasks %}
<div class="task-row {% if task.status == 'done' %}done{% endif %}"
     id="task-row-{{ task.id }}"
     onclick="selectRow(this)">
    <div class="task-content"
         hx-get="/tasks/{{ task.id }}"
         hx-target="#detail-pane"
         hx-swap="innerHTML">
        <div class="task-title">{{ task.name }}</div>
        <div class="meta">
            {% if task.score is defined %}
            <span class="score-badge" title="Score: {{ task.score }} (imp={{ task.importance }}, urg={{ task.urgency }})">
                {{ task.score }}
            </span>
            {% endif %}
            {% if task.priority_name %}
            <span class="priority-badge">{{ task.priority_name }}</span>
            {% endif %}
            <span class="status-indicator {{ task.status }}">
                {{ task.status }}
            </span>
            {% if task.due_date %}
            <span class="due-date">{{ task.due_date }}</span>
            {% endif %}
        </div>
    </div>
    <button class="quick-done {% if task.status == 'done' %}checked{% endif %}"
            hx-post="/tasks/{{ task.id }}/toggle"
            hx-target="closest .task-row"
            hx-swap="outerHTML"
            onclick="event.stopPropagation();"
            title="{% if task.status == 'done' %}Requeue{% else %}Mark done{% endif %}">
        ✓
    </button>
</div>
{% else %}
<div class="empty-state">
    <h3>No tasks found</h3>
    <p>All caught up!</p>
</div>
{% endfor %}
