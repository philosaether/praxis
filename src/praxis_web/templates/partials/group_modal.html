{# Create Group Modal #}
<div class="modal-backdrop" id="group-modal-backdrop" onclick="if(event.target === this) closeGroupModal()">
    <div class="modal group-modal">
        <div class="modal-header">
            <h2>New Group</h2>
            <button type="button" class="modal-close" onclick="closeGroupModal()">&times;</button>
        </div>
        <div class="modal-body">
            <div class="property-row">
                <label for="group-name">Group name</label>
                <input type="text"
                       id="group-name"
                       class="property-input"
                       placeholder="e.g. Cofounders"
                       autocomplete="off">
            </div>
            <div class="property-row">
                <label>Members</label>
                <div id="group-member-list" class="group-member-list">
                    <p class="text-muted">Loading friends...</p>
                </div>
            </div>
        </div>
        <div class="modal-footer">
            <button type="button" class="btn btn-secondary" onclick="closeGroupModal()">Cancel</button>
            <button type="button"
                    class="btn btn-primary"
                    id="create-group-btn"
                    onclick="createGroup()">
                Create Group
            </button>
        </div>
    </div>
</div>
