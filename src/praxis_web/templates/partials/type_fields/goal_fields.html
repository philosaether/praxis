{# Goal-specific fields #}
{# Used in: priority_new_form.html, quick_add_priority_modal.html, goal_properties.html #}

<div class="property-row">
    <label for="complete_when">Complete When</label>
    <textarea id="complete_when"
              name="complete_when"
              rows="3"
              class="property-input"
              placeholder="What does done look like?">{{ priority.complete_when or '' if priority else '' }}</textarea>
</div>

<div class="property-row">
    <label for="progress">Progress</label>
    <input type="text"
           id="progress"
           name="progress"
           value="{{ priority.progress or '' if priority else '' }}"
           class="property-input"
           placeholder="e.g., 3/10, 70%">
</div>

<div class="property-row">
    <label for="due_date">Due Date</label>
    <input type="date"
           id="due_date"
           name="due_date"
           value="{{ priority.due_date or '' if priority else '' }}"
           class="property-input">
</div>
