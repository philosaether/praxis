{# Task panel for priority detail - used for HTMX refresh #}
{# Expects: priority, tasks #}

<div id="priority-tasks-panel" class="associated-tasks-section">
    <div class="section-header">
        <div class="section-title">
            <h3>Tasks</h3>
            <span class="task-count">{{ tasks|length if tasks else 0 }}</span>
        </div>
        <button type="button"
                class="btn btn-sm btn-secondary"
                onclick="openQuickAdd('{{ priority.id }}')">
            + New Task
        </button>
    </div>
    {% if tasks %}
    <ul class="task-list-compact">
        {% for task in tasks %}
        <li class="task-item-compact {% if task.status == 'done' %}done{% endif %}">
            <a href="#"
               hx-get="/tasks/{{ task.id }}"
               hx-target="#detail-content"
               hx-swap="innerHTML">
                {{ task.name }}
            </a>
            <span class="pill pill--xs pill--status-{{ task.status }}">{{ task.status }}</span>
        </li>
        {% endfor %}
    </ul>
    {% else %}
    <p class="empty-hint">No tasks linked to this priority</p>
    {% endif %}
</div>
