<div class="tree-view">
    {% for root in roots %}
    <div class="tree-node">
        <div class="tree-node-content"
             hx-get="/priorities/{{ root.id }}"
             hx-target="#detail-pane"
             hx-swap="innerHTML">
            {% set child_ids = graph.children.get(root.id) %}
            {% if child_ids %}
            <span class="tree-toggle"
                  hx-get="/priorities/tree/{{ root.id }}/children"
                  hx-target="#children-{{ root.id }}"
                  hx-swap="innerHTML"
                  onclick="event.stopPropagation(); this.classList.toggle('expanded');">
                <span class="chevron">+</span>
            </span>
            {% else %}
            <span class="tree-toggle-spacer"></span>
            {% endif %}
            <span class="type-badge {{ root.priority_type }}">{{ root.priority_type[:3] }}</span>
            <span class="tree-node-name">{{ root.name }}</span>
            <span class="tree-node-id">{{ root.id }}</span>
        </div>
        <div class="tree-children" id="children-{{ root.id }}">
            <!-- Children loaded via HTMX when expanded -->
        </div>
    </div>
    {% else %}
    <div class="empty-state">
        <h3>No root priorities found</h3>
    </div>
    {% endfor %}
</div>
