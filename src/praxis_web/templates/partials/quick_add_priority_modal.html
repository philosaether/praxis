{# Priority quick-add modal #}
{# Expects: priorities (for parent dropdown), priority_types #}

<div class="modal-backdrop" id="quick-add-priority-backdrop" onclick="if(event.target === this) closeQuickAddPriority()">
    <div class="modal priority-modal" onclick="event.stopPropagation()">
        <div class="modal-header">
            <h2>New Priority</h2>
            <button type="button" class="modal-close" onclick="closeQuickAddPriority()">&times;</button>
        </div>
        <form hx-post="/priorities/quick-add"
              hx-target="#item-list"
              hx-swap="afterbegin"
              hx-on::after-request="handleQuickAddPriorityResponse(event)">
            <div class="modal-body">
                <input type="text"
                       id="quick-add-priority-name"
                       name="name"
                       placeholder="What's the priority?"
                       class="quick-add-input"
                       autocomplete="off"
                       required>

                <details class="more-options">
                    <summary>More options</summary>
                    <div class="property-row">
                        <label for="quick-add-priority-type">Type</label>
                        <select id="quick-add-priority-type"
                                name="priority_type"
                                hx-get="/priorities/quick-add/fields"
                                hx-target="#quick-add-priority-type-fields"
                                hx-swap="innerHTML"
                                hx-trigger="change">
                            {% for t in priority_types %}
                            <option value="{{ t }}" {% if t == 'initiative' %}selected{% endif %}>
                                {{ t|title }}
                            </option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="property-row">
                        <label for="quick-add-priority-parent">Parent</label>
                        <select id="quick-add-priority-parent" name="parent_id">
                            <option value="">None</option>
                            {% for p in priorities %}
                            <option value="{{ p.id }}">{{ p.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div id="quick-add-priority-type-fields">
                        {# Initiative has no type-specific fields #}
                    </div>
                </details>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" onclick="closeQuickAddPriority()">Cancel</button>
                <button type="submit" class="btn btn-primary">Add Priority</button>
            </div>
        </form>
    </div>
</div>
