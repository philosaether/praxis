<div class="task-row {% if task.status == 'done' %}done{% endif %}"
     id="task-row-{{ task.id }}"
     {% if oob %}hx-swap-oob="true"{% endif %}
     onclick="selectRow(this)">
    <div class="task-content"
         hx-get="/tasks/{{ task.id }}"
         hx-target="#detail-content"
         hx-swap="innerHTML"
         hx-push-url="true">
        <div class="task-title">{{ task.name }}</div>
        <div class="meta">
            {% if task.score is defined %}
            <span class="pill pill--xs pill--score" title="Score: {{ task.score }} (imp={{ task.importance }}, urg={{ task.urgency }})">
                {{ task.score }}
            </span>
            {% endif %}
            {% if task.priority_name %}
            <span class="pill pill--{{ task.priority_type or 'inbox' }}">{{ task.priority_name }}</span>
            {% endif %}
            <span class="pill pill--status-{{ task.status }}">
                {{ task.status }}
            </span>
            {% if task.due_date %}
            <span class="due-date">{{ task.due_date }}</span>
            {% endif %}
        </div>
    </div>
    {% if task.can_toggle %}
    <button class="quick-done {% if task.status == 'done' %}checked{% endif %}"
            hx-post="/tasks/{{ task.id }}/toggle"
            hx-target="closest .task-row"
            hx-swap="outerHTML"
            onclick="event.stopPropagation();"
            title="{% if task.status == 'done' %}Requeue{% else %}Mark done{% endif %}">
        ✓
    </button>
    {% endif %}
</div>
