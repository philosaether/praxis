{# New task creation form #}
{# Expects: priorities #}

<div class="detail-view">
    <div id="properties-section">
        <div class="properties-section task-properties">
            <form hx-post="/tasks/create"
                  hx-target="#detail-content"
                  hx-swap="innerHTML">

                <!-- Name (required) -->
                <div class="property-row">
                    <label for="name">Name</label>
                    <input type="text"
                           id="name"
                           name="name"
                           placeholder="Task name"
                           maxlength="90"
                           required
                           autofocus
                           autocomplete="off"
                           class="property-input title-input">
                </div>

                <!-- Priority -->
                <div class="property-row">
                    <label for="priority_id">Priority</label>
                    <select id="priority_id" name="priority_id" class="property-input">
                        <option value="">Inbox (no priority)</option>
                        {% for p in priorities %}
                        <option value="{{ p.id }}">[{{ p.priority_type[:3]|upper }}] {{ p.name }}</option>
                        {% endfor %}
                    </select>
                </div>

                <!-- Due Date -->
                <div class="property-row">
                    <label for="due_date">Due Date</label>
                    <input type="date"
                           id="due_date"
                           name="due_date"
                           class="property-input">
                </div>

                <!-- Notes -->
                <div class="property-row">
                    <label for="notes">Notes</label>
                    <textarea id="notes"
                              name="notes"
                              rows="6"
                              class="property-input"
                              placeholder="Add notes... (supports Markdown)"></textarea>
                </div>

                <!-- Save Button -->
                <div class="property-actions">
                    <div class="actions-left">
                        <button type="submit" class="btn btn-primary">Create Task</button>
                    </div>
                    <div class="actions-right">
                        <button type="button"
                                class="btn btn-secondary"
                                onclick="document.getElementById('detail-content').innerHTML = '<div class=\'empty-state\'><h3>Select an item</h3><p>Click an item on the left to view details</p></div>';">
                            Cancel
                        </button>
                    </div>
                </div>

                <!-- Validation errors -->
                <div id="property-errors" class="property-errors"></div>
            </form>
        </div>
    </div>
</div>
